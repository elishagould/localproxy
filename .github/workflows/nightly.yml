name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *' # Runs every day at 2:00 AM UTC
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output ./publish

      - name: Zip published output
        run: Compress-Archive -Path ./publish/* -DestinationPath ./publish/nightly.zip
        shell: pwsh

      - name: Get last nightly commit
        id: lastnightly
        shell: cmd
        run: |
          set NIGHTLY_TAG=
          for /f %%t in ('gh release list --limit 5 --json tagName --jq ".[] | select(.tagName | test(\"^nightly-\")) | .tagName"') do (
            if not defined NIGHTLY_TAG set NIGHTLY_TAG=%%t
          )
          if not defined NIGHTLY_TAG (
            echo. > lastnightly_commit.txt
          ) else (
            gh release view %NIGHTLY_TAG% --json targetCommitish --jq .targetCommitish > lastnightly_commit.txt
          )
          set /p commit=<lastnightly_commit.txt
          echo commit=%commit%>> %GITHUB_OUTPUT%
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current commit
        id: currentcommit
        shell: cmd
        run: |
          for /f %%c in ('git rev-parse HEAD') do set commit=%%c
          echo commit=%commit%>> %GITHUB_OUTPUT%

      - name: Check for changes since last nightly
        id: checkchanges
        shell: cmd
        run: |
          setlocal enableextensions enabledelayedexpansion
          set lastnightly_commit=${{ steps.lastnightly.outputs.commit }}
          set current_commit=${{ steps.currentcommit.outputs.commit }}
          if /i "!lastnightly_commit!" == "!current_commit!" (
            echo No changes since last nightly. Skipping release.
            echo skip=true>> %GITHUB_OUTPUT%
          ) else (
            echo skip=false>> %GITHUB_OUTPUT%
          )

      - name: Create Nightly Release
        if: steps.checkchanges.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly Build ${{ github.run_id }}
          body: 'Automated nightly build.'
          prerelease: true
          files: ./publish/nightly.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old nightly releases (keep 2)
        if: steps.checkchanges.outputs.skip == 'false'
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          gh release list --limit 100 --json tagName --jq ".[].tagName" | findstr nightly > todelete.txt
          more +2 todelete.txt > todelete2.txt
          if exist todelete2.txt (
            for /f %%r in (todelete2.txt) do gh release delete %%r --yes
          )
          exit /b 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
